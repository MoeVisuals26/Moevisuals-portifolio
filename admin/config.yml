                  - { label: "Caption (optional)", name: "caption", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Snapshots / Photos (add as many as you want)"
                name: "snapshots"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }

