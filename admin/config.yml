backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "assets/uploads"

# ─────────────────────────────────────────────
#  MOEVISUALS — Content Manager
#  Mohamed can add / edit projects here.
#  Three sections: Campaigns · Documentaries · AI Shoots
# ─────────────────────────────────────────────

collections:

  # ── CAMPAIGNS ────────────────────────────────
  - name: "campaigns"
    label: "Campaigns"
    files:
      - file: "content/campaigns.json"
        label: "All Campaign Projects"
        name: "campaigns"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            label_singular: "Campaign Project"
            summary: "{{fields.title}}"
            fields:

              - label: "Project Title"
                name: "title"
                widget: "string"
                hint: "e.g.  SICK Campaign"

              - label: "Slug  (unique ID — lowercase, no spaces, use dashes)"
                name: "slug"
                widget: "string"
                hint: "e.g.  sick-campaign   |   Must be unique — no two projects can share the same slug."

              - label: "Cover Photo  (shown on the Campaigns page)"
                name: "thumbnail"
                widget: "image"
                required: false
                hint: "Upload the photo that appears as the project card."

              - label: "Card Shape"
                name: "cardRatio"
                widget: "select"
                default: "9:16"
                options:
                  - { label: "Vertical / Portrait  (9:16)  — recommended for fashion / reels", value: "9:16" }
                  - { label: "Landscape  (16:9)  — recommended for wide shots", value: "16:9" }
                  - { label: "Square  (1:1)", value: "1:1" }

              - label: "Short Description"
                name: "description"
                widget: "text"
                hint: "1–2 sentences about the project."

              - label: "Videos  (add as many reels as you like)"
                name: "videos"
                widget: "list"
                required: false
                label_singular: "Video"
                summary: "Video {{i}}"
                fields:
                  - label: "Google Drive / YouTube / Vimeo Link  ← use this for all videos"
                    name: "link"
                    widget: "string"
                    required: false
                    hint: "Paste the share link — e.g.  https://drive.google.com/file/d/XXXX/view"
                  - label: "Or upload a small video file  (under 10 MB only)"
                    name: "file"
                    widget: "file"
                    required: false
                    hint: "For longer videos always use the Google Drive link above instead."
                  - label: "Caption  (optional)"
                    name: "caption"
                    widget: "string"
                    required: false

              - label: "Snapshots / Photos  (add as many as you like)"
                name: "snapshots"
                widget: "list"
                required: false
                label_singular: "Photo"
                field: { label: "Photo", name: "image", widget: "image" }

              - label: "Page Cover  (optional — leave empty)"
                name: "pageCover"
                widget: "image"
                required: false
                hint: "Only needed if you want a different photo on the project page than the card cover. Usually leave this empty."

  # ── DOCUMENTARIES ────────────────────────────
  - name: "documentaries"
    label: "Documentaries"
    files:
      - file: "content/documentaries.json"
        label: "All Documentary Projects"
        name: "documentaries"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            label_singular: "Documentary Project"
            summary: "{{fields.title}}"
            fields:

              - label: "Project Title"
                name: "title"
                widget: "string"
                hint: "e.g.  Ringside Glory"

              - label: "Slug  (unique ID — lowercase, no spaces, use dashes)"
                name: "slug"
                widget: "string"
                hint: "e.g.  ringside-glory"

              - label: "Cover Photo  (shown on the Documentaries page)"
                name: "thumbnail"
                widget: "image"
                required: false

              - label: "Card Shape"
                name: "cardRatio"
                widget: "select"
                default: "16:9"
                options:
                  - { label: "Landscape  (16:9)  — recommended for documentaries", value: "16:9" }
                  - { label: "Vertical / Portrait  (9:16)", value: "9:16" }
                  - { label: "Square  (1:1)", value: "1:1" }

              - label: "Short Description"
                name: "description"
                widget: "text"
                hint: "1–2 sentences about the project."

              - label: "Video  (add one)"
                name: "videos"
                widget: "list"
                required: false
                label_singular: "Video"
                summary: "Video {{i}}"
                fields:
                  - label: "Google Drive / YouTube / Vimeo Link"
                    name: "link"
                    widget: "string"
                    required: false
                    hint: "Paste the share link — e.g.  https://drive.google.com/file/d/XXXX/view"
                  - label: "Or upload a small video file  (under 10 MB only)"
                    name: "file"
                    widget: "file"
                    required: false
                  - label: "Caption  (optional)"
                    name: "caption"
                    widget: "string"
                    required: false

              - label: "Snapshots / Photos  (optional)"
                name: "snapshots"
                widget: "list"
                required: false
                label_singular: "Photo"
                field: { label: "Photo", name: "image", widget: "image" }

              - label: "Page Cover  (optional — leave empty)"
                name: "pageCover"
                widget: "image"
                required: false
                hint: "Leave empty — the Cover Photo above is used automatically."

  # ── AI SHOOTS ────────────────────────────────
  - name: "ai-shoots"
    label: "AI Shoots"
    files:
      - file: "content/ai-shoots.json"
        label: "All AI Shoot Projects"
        name: "ai-shoots"
        fields:
          - label: "Projects"
            name: "items"
            widget: "list"
            label_singular: "AI Shoot Project"
            summary: "{{fields.title}}"
            fields:

              - label: "Project Title"
                name: "title"
                widget: "string"
                hint: "e.g.  Flashy"

              - label: "Slug  (unique ID — lowercase, no spaces, use dashes)"
                name: "slug"
                widget: "string"
                hint: "e.g.  ai-flashy"

              - label: "Cover Photo  (shown on the AI Shoots page)"
                name: "thumbnail"
                widget: "image"
                required: false

              - label: "Card Shape"
                name: "cardRatio"
                widget: "select"
                default: "9:16"
                options:
                  - { label: "Vertical / Portrait  (9:16)", value: "9:16" }
                  - { label: "Landscape  (16:9)", value: "16:9" }
                  - { label: "Square  (1:1)", value: "1:1" }

              - label: "Short Description"
                name: "description"
                widget: "text"
                hint: "1–2 sentences about the project."

              - label: "Video  (add one)"
                name: "videos"
                widget: "list"
                required: false
                label_singular: "Video"
                summary: "Video {{i}}"
                fields:
                  - label: "Google Drive / YouTube / Vimeo Link"
                    name: "link"
                    widget: "string"
                    required: false
                    hint: "Paste the share link — e.g.  https://drive.google.com/file/d/XXXX/view"
                  - label: "Or upload a small video file  (under 10 MB only)"
                    name: "file"
                    widget: "file"
                    required: false
                  - label: "Caption  (optional)"
                    name: "caption"
                    widget: "string"
                    required: false

              - label: "Snapshots / Photos  (optional)"
                name: "snapshots"
                widget: "list"
                required: false
                label_singular: "Photo"
                field: { label: "Photo", name: "image", widget: "image" }

              - label: "Page Cover  (optional — leave empty)"
                name: "pageCover"
                widget: "image"
                required: false
                hint: "Leave empty — the Cover Photo above is used automatically."
